<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Просмотр сайта</title>
</head>
<body>
    <script>
        // ⚠️ ВСТАВЬ ТОТ ЖЕ URL ⚠️
        const API_URL = 'https://script.google.com/macros/s/AKfycbz32K1279fYJ1PplFuZJtU8zEwIa7J9ZUitXUeolAJdVNZpDu0Bl48qtlo8nWVZsPoe/exec';
        
        const params = new URLSearchParams(window.location.search);
        const siteName = params.get('site');
        
        if (siteName) {
            fetch(API_URL + '?name=' + encodeURIComponent(siteName))
                .then(response => response.text())
                .then(html => {
                    document.write(html);
                    document.close();
                })
                .catch(() => {
                    document.body.innerHTML = '<h1>❌ Ошибка загрузки сайта</h1><a href="/">На главную</a>';
                });
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
