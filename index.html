<!DOCTYPE html>
<html>
<head>
    <title>Google Tables Хостинг</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial;
            padding: 50px;
            text-align: center;
            color: white;
        }
        textarea {
            width: 80%;
            height: 300px;
            font-family: monospace;
            padding: 10px;
            margin: 20px 0;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 30px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .link {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            word-break: break-all;
        }
        a {
            color: white;
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🚀 Хостинг на Google Таблицах</h1>
    <p>Вставь HTML код и получи вечную ссылку</p>
    
    <textarea id="code" placeholder="<h1>Привет, мир!</h1>"></textarea><br>
    <input type="text" id="siteName" placeholder="Название сайта (например, my-site)">
    <button onclick="publish()">✨ Опубликовать</button>
    
    <div id="result" class="link" style="display: none;"></div>
    <div id="error" class="error" style="display: none;"></div>

    <script>
        // ⚠️ ВСТАВЬ СВОЙ URL ИЗ GOOGLE APPS SCRIPT ⚠️
        const API_URL = 'https://script.google.com/macros/s/AKfycbz32K1279fYJ1PplFuZJtU8zEwIa7J9ZUitXUeolAJdVNZpDu0Bl48qtlo8nWVZsPoe/exec';
        
        async function publish() {
            const code = document.getElementById('code').value;
            let name = document.getElementById('siteName').value;
            
            if (!code) {
                showError('Введите HTML код!');
                return;
            }
            
            if (!name) {
                name = 'site_' + Date.now();
            }
            
            // Очищаем имя от плохих символов
            name = name.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            
            try {
                // Сохраняем сайт через Google Apps Script
                const saveResponse = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Важно для Google!
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, html: code })
                });
                
                // Показываем ссылку
                const link = window.location.origin + '/view.html?site=' + name;
                document.getElementById('result').innerHTML = `
                    <strong>✅ Сайт опубликован!</strong><br>
                    <a href="${link}" target="_blank">${link}</a><br><br>
                    <small>⚠️ Первое открытие может занять 2-3 секунды</small>
                `;
                document.getElementById('result').style.display = 'block';
                hideError();
                
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
