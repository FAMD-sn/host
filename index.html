<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесплатный HTML Хостинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
            animation: fadeInUp 0.8s;
        }
        
        .editor-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 1s;
        }
        
        textarea {
            width: 100%;
            height: 400px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .result {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            display: none;
            animation: slideIn 0.5s;
        }
        
        .result.show {
            display: block;
        }
        
        .link {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .link a {
            color: #667eea;
            font-size: 18px;
            word-break: break-all;
            text-decoration: none;
        }
        
        .link a:hover {
            text-decoration: underline;
        }
        
        .preview {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        
        iframe {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        .info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }
            
            textarea {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Бесплатный HTML Хостинг</h1>
            <p>Вставь код - получи вечную ссылку. Без лимитов. Навсегда.</p>
        </div>
        
        <div class="editor-box">
            <textarea id="code" placeholder="<h1>Привет, мир!</h1><p>Мой первый сайт</p>"></textarea>
            <input type="text" id="customName" placeholder="Своё название (необязательно)">
            <button onclick="publish()">✨ Опубликовать сайт</button>
        </div>
        
        <div id="result" class="result">
            <div class="link">
                <strong>✅ Сайт успешно опубликован!</strong><br>
                <span id="siteLink"></span>
            </div>
            <div class="preview">
                <strong>👁️ Предпросмотр:</strong><br>
                <iframe id="preview" srcdoc=""></iframe>
            </div>
        </div>
        
        <div class="info">
            💡 Сайты хранятся вечно и доступны по ссылке. Никаких лимитов!
        </div>
    </div>
    
    <script>
        // Загрузка сохранённых сайтов при старте
        const sites = JSON.parse(localStorage.getItem('sites') || '{}');
        
        function publish() {
            const code = document.getElementById('code').value;
            let name = document.getElementById('customName').value;
            
            if (!code.trim()) {
                alert('❌ Введи HTML код!');
                return;
            }
            
            // Генерация имени
            if (!name.trim()) {
                name = 'site_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            } else {
                name = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
            }
            
            // Сохраняем сайт
            sites[name] = code;
            localStorage.setItem('sites', JSON.stringify(sites));
            
            // Показываем ссылку
            const link = window.location.origin + '/view.html?site=' + encodeURIComponent(name);
            document.getElementById('siteLink').innerHTML = '<a href="' + link + '" target="_blank">' + link + '</a>';
            document.getElementById('preview').srcdoc = code;
            document.getElementById('result').classList.add('show');
            
            // Очищаем поле имени
            document.getElementById('customName').value = '';
        }
        
        // Автосохранение черновика
        const textarea = document.getElementById('code');
        textarea.addEventListener('input', () => {
            localStorage.setItem('draft', textarea.value);
        });
        
        // Восстановление черновика
        const draft = localStorage.getItem('draft');
        if (draft) {
            textarea.value = draft;
        }
        
        // Пример кода для новичков
        if (!textarea.value) {
            textarea.value = `<!DOCTYPE html>
<html>
<head>
    <title>Мой первый сайт</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial;
            text-align: center;
            padding: 50px;
            color: white;
        }
        h1 {
            font-size: 48px;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>🎉 Поздравляю!</h1>
    <p>Твой сайт работает на бесплатном хостинге</p>
    <p>✨ Без лимитов ✨</p>
</body>
</html>`;
        }
    </script>
</body>
</html>
